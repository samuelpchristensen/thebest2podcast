<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
    <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <link rel="stylesheet" href="/css/main.css?v=3">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="nav">
        <div class="container nav-inner">
            <a href="/" class="nav-logo">The Best <span>2</span></a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/episodes/">Episodes</a></li>
                <li><a href="/about/">About</a></li>
                <li><a href="https://www.youtube.com/@TheBest2Podcast" target="_blank">YouTube</a></li>
            </ul>
        </div>
    </nav>
    
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    
    <footer class="footer">
        <div class="container footer-inner">
            <p>&copy; 2026 The Best 2 Podcast. All rights reserved.</p>
            <div class="footer-links">
                <a href="https://www.youtube.com/@TheBest2Podcast" target="_blank">YouTube</a>
                <a href="https://linktr.ee/TheBest2Podcast" target="_blank">Linktree</a>
            </div>
        </div>
    </footer>
</body>
</html>
