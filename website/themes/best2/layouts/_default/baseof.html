<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
    
    <!-- Primary Meta Tags -->
    <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <meta name="keywords" content="podcast, LDS mission, Mormon, returned missionary, career, BYU, missionary service, leadership">
    <meta name="author" content="Samuel Christensen">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#E53935">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="{{ .Permalink }}">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="{{ if eq .Type "episodes" }}article{{ else }}website{{ end }}">
    <meta property="og:url" content="{{ .Permalink }}">
    <meta property="og:title" content="{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}">
    <meta property="og:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <meta property="og:image" content="{{ if .Params.youtube_id }}https://img.youtube.com/vi/{{ .Params.youtube_id }}/maxresdefault.jpg{{ else }}https://thebest2podcast.com/images/og-image.jpg{{ end }}">
    <meta property="og:site_name" content="The Best 2 Podcast">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="{{ .Permalink }}">
    <meta property="twitter:title" content="{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}">
    <meta property="twitter:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <meta property="twitter:image" content="{{ if .Params.youtube_id }}https://img.youtube.com/vi/{{ .Params.youtube_id }}/maxresdefault.jpg{{ else }}https://thebest2podcast.com/images/og-image.jpg{{ end }}">
    
    <!-- RSS Feed -->
    <link rel="alternate" type="application/rss+xml" title="The Best 2 Podcast RSS Feed" href="/index.xml">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- CSS -->
    {{ $css := resources.Get "css/modern-2026.css" | resources.Minify }}
    <link rel="stylesheet" href="{{ $css.RelPermalink }}">
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <a href="/" class="logo">
                <div class="logo-mark">B2</div>
                <span>The Best 2</span>
            </a>
            <nav>
                <button class="menu-toggle" aria-label="Toggle menu" onclick="document.querySelector('.nav-links').classList.toggle('active')">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/episodes/">Episodes</a></li>
                    <li><a href="/about/">About</a></li>
                    <li><a href="/subscribe/">Subscribe</a></li>
                </ul>
            </nav>
        </div>
    </header>
    
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    
    <footer class="footer">
        <div class="container footer-inner">
            <div class="footer-logo">The Best 2</div>
            <div class="footer-links">
                <a href="/">Home</a>
                <a href="/episodes/">Episodes</a>
                <a href="/about/">About</a>
                <a href="https://www.youtube.com/@TheBest2Podcast" target="_blank">YouTube</a>
            </div>
            <p class="footer-copy">&copy; 2026 The Best 2 Podcast. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
